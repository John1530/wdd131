<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Submit a product review and rate your experience.">
    <meta name="author" content="John S. Arava">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="icon" href="images/favico.jpeg" type="image/png">
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
    <form method="get" action="review.html" autocomplete="on">

        <div class="form-group">
            <label for="productName">Product Name *</label>
            <select id="productName" name="productName" autocomplete="off" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>
        </div>

        <div class="form-group">
            <p>Overall Rating *</p>

            <div class="rating">
                <label for="star1">
                    ☆
                    <input type="radio" id="star1" name="rating" value="1" required>
                </label>

                <label for="star2">
                    ☆☆
                    <input type="radio" id="star2" name="rating" value="2">
                </label>

                <label for="star3">
                    ☆☆☆
                    <input type="radio" id="star3" name="rating" value="3">
                </label>

                <label for="star4">
                    ☆☆☆☆
                    <input type="radio" id="star4" name="rating" value="4">
                </label>

                <label for="star5">
                    ☆☆☆☆☆
                    <input type="radio" id="star5" name="rating" value="5">
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="installDate">Date of Installation *</label>
            <input
                type="date"
                id="installDate"
                name="installDate"
                autocomplete="off"
                required>
        </div>

        <div class="form-group">
            <p>Useful Features</p>

            <label>
                <input
                    type="checkbox"
                    id="durability"
                    name="features"
                    value="Durability">
                Durability
            </label>

            <label>
                <input
                    type="checkbox"
                    id="easeOfUse"
                    name="features"
                    value="Ease of Use">
                Ease of Use
            </label>

            <label>
                <input
                    type="checkbox"
                    id="performance"
                    name="features"
                    value="Performance">
                Performance
            </label>

            <label>
                <input
                    type="checkbox"
                    id="design"
                    name="features"
                    value="Design">
                Design
            </label>
        </div>

        <div class="form-group">
            <label for="review">
                Written Review (Optional)
            </label>

            <textarea
                id="review"
                name="review"
                rows="5"
                autocomplete="off"></textarea>
        </div>

        <div class="form-group">
            <label for="userName">
                User Name (Optional)
            </label>

            <input
                type="text"
                id="userName"
                name="userName"
                autocomplete="name">
    
        </div>
        <input
            type="submit"
            value="Submit Review"
            class="submit-btn">
    </form>
</main>

<footer>
    <p>&copy;<span id="currentYear"></span> 🚀John S. Arava 🚀 India.</p>
    <p>last Modification: <span id="lastModified"></span></p>
</footer>


</body>
</html>
