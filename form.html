<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Submit a product review and rate your experience with selected products.">
    <meta name="author" content="John S. Arava">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <link rel="icon" href="images/favico.jpeg" type="image/png">
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
    <form method="get" action="review.html" autocomplete="on">

        <div class="form-group">
            <label for="productName">Product Name *</label>
            <select id="productName" name="productName" autocomplete="off" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>
        </div>

        <div class="form-group">
            <p>Overall Rating *</p>

            <div class="rating">
                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">☆</label>

                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star2">☆☆</label>

                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star3">☆☆☆</label>

                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star4">☆☆☆☆</label>

                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">☆☆☆☆☆</label>
            </div>
        </div>

        <div class="form-group">
            <label for="installDate">Date of Installation *</label>
            <input
                type="date"
                id="installDate"
                name="installDate"
                autocomplete="off"
                required>
        </div>

        <div class="form-group">
            <p>Useful Features</p>

            <div>
                <input type="checkbox" id="durability" name="durability" value="Durability">
                <label for="durability">Durability</label>
            </div>

            <div>
                <input type="checkbox" id="easeOfUse" name="easeOfUse" value="Ease of Use">
                <label for="easeOfUse">Ease of Use</label>
            </div>

            <div>
                <input type="checkbox" id="performance" name="performance" value="Performance">
                <label for="performance">Performance</label>
            </div>

            <div>
                <input type="checkbox" id="design" name="design" value="Design">
                <label for="design">Design</label>
            </div>
        </div>

        <div class="form-group">
            <label for="review">
                Written Review (Optional)
            </label>

            <textarea
                id="review"
                name="review"
                rows="5"
                autocomplete="off"></textarea>
        </div>

        <div class="form-group">
            <label for="userName">
                User Name (Optional)
            </label>

            <input
                type="text"
                id="userName"
                name="userName"
                autocomplete="name">
    
        </div>
        <input
            type="submit"
            value="Submit Review"
            class="submit-btn">
    </form>
</main>

<footer>
    <p>&copy;<span id="currentYear"></span> 🚀John S. Arava 🚀 India.</p>
    <p>last Modification: <span id="lastModified"></span></p>
</footer>


</body>
</html>
