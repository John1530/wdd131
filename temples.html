<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album website showing beautiful temples with responsive design using HTML, CSS, and JavaScript.">
    <meta name="author" content="John S. Arava">
    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto&display=swap" rel="stylesheet">

    <!-- Favicon-->
    <link rel="icon" href="images/favico.jpeg" type="image/png">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-top">
            <h2>Temple Album</h2>

            <button id="menu-button">☰</button>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h1>Temple Gallery</h1>

        <div class="gallery">

            <figure>
                <img src="images/kirtlandtemple.jpg" alt="Kirtland Temple">
                <figcaption>Kirtland Temple</figcaption>
            </figure>

            <figure>
                <img src="images/nauvooillinoistemple.jpg" alt="Nauvoo temple">
                <figcaption>Nauvoo Illinois Temple</figcaption>
            </figure>

            <figure>
                <img src="images/saltlaketemple.jpg" alt="Salt Lake Temple">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/londonenglandtemple.jpg" alt="London England temple">
                <figcaption>London England Temple</figcaption>
            </figure>

            <figure>
                <img src="images/prestonenglandtemple.jpg" alt="Preston England Temple">
                <figcaption>Preston England Temple</figcaption>
            </figure>

            <figure>
                <img src="images/sandiego.california.temple.jpg" alt="San Diego California Temple">
                <figcaption>San Diego California Temple</figcaption>
            </figure>

            <figure>
                <img src="images/washingtond.c.temple.jpg" alt="Washington D.C Temple">
                <figcaption>Washington D.C Temple</figcaption>
            </figure>

            <figure>
                <img src="images/hongkongchinatemple.jpg" alt="Hong Kong Temple">
                <figcaption>Hong Kong China Temple</figcaption>
            </figure>

            <figure>
                <img src="images/bengaluruindiatemple.jpg" alt="India Bangluru Temple">
                <figcaption>India Bangaluru Temple</figcaption>
            </figure>

        </div>
    </main>

    <footer>
            <p>&copy;<span id="currentYear"></span> 🚀John S. Arava 🚀 India.</p>
            <p>last Modification: <span id="lastModified"></span></p>
        </footer>
</body>
</html>
